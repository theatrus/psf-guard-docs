<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="PSF Guard logo">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#c7f9ef"/>
      <stop offset="1" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Shield -->
  <path d="M64 6 L114 24 V60 C114 92 92 112 64 122 C36 112 14 92 14 60 V24 Z"
        fill="#0b1120" stroke="url(#g)" stroke-width="5" stroke-linejoin="round"/>
  <!-- Airy rings (the PSF) -->
  <circle cx="64" cy="62" r="30" fill="none" stroke="url(#g)" stroke-width="2" opacity="0.35"/>
  <circle cx="64" cy="62" r="18" fill="none" stroke="url(#g)" stroke-width="2.5" opacity="0.6"/>
  <!-- Diffraction spikes -->
  <g fill="#e8fdf8">
    <path d="M64 20 L66.5 54 L64 60 L61.5 54 Z" opacity="0.9"/>
    <path d="M64 104 L66.5 70 L64 64 L61.5 70 Z" opacity="0.9"/>
    <path d="M24 62 L56 59.5 L62 62 L56 64.5 Z" opacity="0.9"/>
    <path d="M104 62 L72 59.5 L66 62 L72 64.5 Z" opacity="0.9"/>
  </g>
  <!-- Central peak -->
  <circle cx="64" cy="62" r="12" fill="url(#core)"/>
  <circle cx="64" cy="62" r="4.5" fill="#ffffff"/>
</svg>
